    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">
</head>

<body>

  <!-- NAV -->

      <div class="logo-img">
        <img src="./img/logo.png" alt="La Resaca Viewpoint Logo">
      </div>
      <div class="nav-logo">
        <span class="logo-script">La Resaca Viewpoint</span>
        <span class="logo-sub">Campestre</span>

    <ul class="nav-links">
      <li><a href="sobre-nosotros.html" class="has-arrow">Sobre nosotros</a></li>
      <li><a href="servicios.html" class="has-arrow">Servicios</a></li>
      <li><a href="galeria.html" class="has-arrow">Galeria</a></li>
      <li><a href="experiencias.html" class="has-arrow">Experiencias</a></li>
    </ul>
    <a href="contacto.html" class="btn-reservar">Contáctanos</a>
  </nav>

    <div class="container reveal">
        <h1 data-i18n="contact_title">Contáctanos</h1>

        <a href="index.html" class="btn-retorno" data-i18n="contact_back">
            <i class="fas fa-arrow-left"></i>
            <span>Inicio</span>
        </a>



        <form class="form-grid" id="contactForm" action="https://formspree.io/f/xanbyqdg" method="POST">
            <input type="text" name="_gotcha" style="display:none"> <!-- Campo oculto para evitar spam -->
            <div class="form-group">
                <label for="nombre" data-i18n="contact_label_name">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required data-i18n-placeholder="form_name_placeholder"
                    placeholder="Tu nombre">
                <span id="nombre-error" class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-group">
                <label for="apellido" data-i18n="contact_label_lastname">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required data-i18n-placeholder="form_name_placeholder"
                    placeholder="Tu apellido">
                <span id="apellido" class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-group">
                <label for="email" data-i18n="contact_label_email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required data-i18n-placeholder="contact_label_email"
                    placeholder="ejemplo@dominio.com">
                <span id="email" class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-group">
                <label for="telefono" data-i18n="contact_label_phone">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" pattern="[0-9]{10}" required
                    data-i18n-placeholder="contact_label_phone" placeholder="Ej: 3112345678">
                <span id="telefono" class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-group full-width">
                <label for="asunto" data-i18n="contact_label_subject">Asunto:</label>
                <select id="asunto" name="asunto" required>
                    <option value="" disabled selected data-i18n="contact_subject_placeholder">Selecciona un tema
                    </option>
                    <option value="reserva" data-i18n="contact_subject_reserva">Reserva</option>
                    <option value="queja" data-i18n="contact_subject_queja">Queja o reclamo</option>
                    <option value="sugerencia" data-i18n="contact_subject_sugerencia">Sugerencia</option>
                    <option value="informacion" data-i18n="contact_subject_informacion">Pregunta General / Información
                    </option>
                    <option value="colaboracion" data-i18n="contact_subject_colaboracion">Propuesta de Colaboración
                    </option>
                    <option value="feedback_estancia" data-i18n="contact_subject_feedback">Comentarios sobre mi Estancia
                    </option>
                </select>
                <span id="asunto-error" class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-group mensaje-full-width">
                <label for="mensaje" data-i18n="contact_label_message">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" required minlength="10"
                    data-i18n-placeholder="contact_message_placeholder"
                    placeholder="Escribe tu mensaje aquí..."></textarea>
                <span id="mensaje-error" class="error-message" aria-live="polite"></span>
            </div>

            <div class="rating-container">
                <p class="rating-title" id="rating-label" data-i18n="contact_rating_title">¿Cómo calificarías tu
                    experiencia?</p>
                <div class="estrellas" role="radiogroup" aria-labelledby="rating-label">
                    <input type="radio" id="estrella5" name="estrellas" value="5">
                    <label for="estrella5" title="Excelente">★</label>

                    <input type="radio" id="estrella4" name="estrellas" value="4">
                    <label for="estrella4" title="Muy bueno">★</label>

                    <input type="radio" id="estrella3" name="estrellas" value="3">
                    <label for="estrella3" title="Bueno">★</label>

                    <input type="radio" id="estrella2" name="estrellas" value="2">
                    <label for="estrella2" title="Regular">★</label>

                    <input type="radio" id="estrella1" name="estrellas" value="1">
                    <label for="estrella1" title="Malo">★</label>
                </div>
            </div>

            <button type="submit" data-i18n="contact_submit">Enviar mensaje</button>
        </form>
    </div>


    <footer>
        <p data-i18n="footer_rights">&copy; 2026 La Resaca Viewpoint. Todos los derechos reservados</p>
        <p><strong data-i18n="footer_contact">Contáctenos:</strong>
            <a href="https://wa.me/573168462657" class="whatsapp-link" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i> +57 3168462657
            </a>
            <a href="tel:+573168462657" class="telefono-link">
                <i class="fas fa-phone"></i> +57 3168462657
            </a>
        </p>
    </footer>

</body>

</html>
